<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="InboxDue dashboard for organizing actionable emails." />
  <title>InboxDue | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand-wrap">
      <p class="eyebrow">Final Project</p>
      <h1>InboxDue</h1>
      <p class="subtitle">Turn inbox noise into clear next actions.</p>
    </div>
    <button id="themeToggle" class="button secondary" aria-label="Toggle color theme">Switch Theme</button>
  </header>

  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" class="active">Dashboard</a>
    <a href="detail.html">Email Detail</a>
    <a href="settings.html">Settings</a>
  </nav>

  <main class="page-shell">
    <section class="controls card" aria-labelledby="controlsTitle">
      <h2 id="controlsTitle">Filter and Sort</h2>
      <form id="searchForm" novalidate>
        <label for="searchInput">Search subject or sender</label>
        <div class="field-row">
          <input id="searchInput" name="search" type="text" placeholder="Try: internship, project, Alex" />
          <button type="submit" class="button">Apply</button>
        </div>
        <p id="searchFeedback" class="feedback" aria-live="polite"></p>
      </form>
      <div class="field-row stacked-mobile">
        <label>
          Category
          <select id="categoryFilter">
            <option value="all">All</option>
            <option value="reply">Needs Reply</option>
            <option value="deadline">Has Deadline</option>
            <option value="action">Action Items</option>
          </select>
        </label>
        <label>
          Sort By
          <select id="sortMode">
            <option value="urgency">Urgency</option>
            <option value="deadline">Deadline</option>
            <option value="sender">Sender A-Z</option>
          </select>
        </label>
      </div>
    </section>

    <section class="stats-grid" aria-label="Dashboard summary">
      <article class="stat card">
        <p class="stat-label">Needs Reply</p>
        <p id="countReply" class="stat-value">0</p>
      </article>
      <article class="stat card">
        <p class="stat-label">Has Deadline</p>
        <p id="countDeadline" class="stat-value">0</p>
      </article>
      <article class="stat card">
        <p class="stat-label">Action Items</p>
        <p id="countAction" class="stat-value">0</p>
      </article>
    </section>

    <section class="card" aria-labelledby="listTitle">
      <div class="section-head">
        <h2 id="listTitle">Action Queue</h2>
        <button id="resetDone" class="button secondary" type="button">Reset Completed</button>
      </div>
      <ul id="emailList" class="email-list" aria-live="polite"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <p>InboxDue prototype using mock data for Day 1-2 milestone.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
